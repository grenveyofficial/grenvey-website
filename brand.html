<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grenvey Brand Identity</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:60px;
font-family:"DM Sans",sans-serif;
background:#F8F6F1;
color:#13291E;
}

h1{
font-family:"Playfair Display",serif;
font-size:60px;
margin-bottom:15px;
}

section{
margin-top:70px;
}

.colors{
display:flex;
gap:25px;
}

.color{
width:170px;
height:170px;
border-radius:18px;
display:flex;
align-items:flex-end;
padding:20px;
font-weight:bold;
color:white;
}

.green1{background:#123A2A;}
.green2{background:#1E6A49;}
.cream{background:#F8F6F1;color:black;border:1px solid #ddd;}
.beige{background:#D9C6A5;color:black;}

.card{
background:white;
padding:30px;
border-radius:18px;
margin-top:25px;
}

.quote{
font-family:"Playfair Display",serif;
font-size:42px;
max-width:700px;
}

</style>

</head>

<body>

<h1>Grenvey Brand Identity</h1>

<p>Premium Natural Nutrition Brand</p>

<section>

<h2>Brand Values</h2>

<div class="card">

<ul>

<li>Natural</li>

<li>Honest</li>

<li>Simple</li>

<li>Modern</li>

<li>Thoughtful</li>

</ul>

</div>

</section>

<section>

<h2>Primary Colours</h2>

<div class="colors">

<div class="color green1">
#123A2A
</div>

<div class="color green2">
#1E6A49
</div>

<div class="color cream">
#F8F6F1
</div>

<div class="color beige">
#D9C6A5
</div>

</div>

</section>

<section>

<h2>Brand Quote</h2>

<div class="card">

<div class="quote">

Nature deserves patience.<br>

People deserve honesty.

</div>

</div>

</section>

</body>

</html>
